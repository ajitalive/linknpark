<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LinkNPark — Sticker Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F8F9FB; }

    /* ── Print styles ── */
    @media print {
      body { background: white !important; }
      .no-print { display: none !important; }
      .print-page { margin: 0; padding: 10mm; box-shadow: none !important; }
      .sticker { break-inside: avoid; }
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }
    }

    /* ── Sticker design ── */
    .sticker {
      width: 85mm;
      height: 54mm;
      background: #2CFF05;
      border: 2px solid #111;
      border-radius: 3mm;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: row;
      font-family: -apple-system, BlinkMacSystemFont, 'Arial Black', Arial, sans-serif;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* Left — text side */
    .sticker-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 3mm 2.5mm 3mm 3.5mm;
      min-width: 0;
    }

    .sticker-brand {
      font-size: 14pt;
      font-weight: 900;
      color: #000;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .sticker-brand-sub {
      font-size: 6.5pt;
      font-weight: 600;
      color: #222;
      letter-spacing: 0.2px;
      margin-top: 1mm;
    }

    .sticker-instruction {
      font-size: 12pt;
      font-weight: 900;
      color: #000;
      line-height: 1.15;
      text-transform: uppercase;
      letter-spacing: -0.3px;
    }

    .sticker-instruction u {
      text-decoration-thickness: 1.5px;
    }

    .sticker-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2mm;
    }

    .sticker-code {
      font-size: 6.5pt;
      font-weight: 800;
      color: #111;
      letter-spacing: 0.8px;
      font-family: 'Courier New', monospace;
      white-space: nowrap;
    }

    .sticker-icons-row {
      display: flex;
      gap: 1mm;
      flex-shrink: 0;
    }

    .sticker-icon {
      width: 5.5mm; height: 5.5mm;
      background: rgba(0,0,0,0.12);
      border-radius: 1mm;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8pt;
    }

    /* Right — QR side */
    .sticker-right {
      width: 36mm;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2mm 2.5mm;
      border-left: 2px solid #111;
      gap: 1.5mm;
      flex-shrink: 0;
    }

    .sticker-qr canvas,
    .sticker-qr img {
      width: 29mm !important;
      height: 29mm !important;
      display: block;
    }

    .sticker-scan-hint {
      font-size: 5.5pt;
      font-weight: 700;
      color: #333;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      line-height: 1.3;
    }

    /* Grid layout for print */
    .sticker-grid {
      display: grid;
      grid-template-columns: repeat(2, 85mm);
      gap: 6mm;
      justify-content: center;
    }

    /* A4 page container */
    .print-page {
      width: 210mm;
      min-height: 297mm;
      background: white;
      margin: 0 auto;
      padding: 15mm;
      box-sizing: border-box;
      box-shadow: 0 4px 32px rgba(0,0,0,0.12);
    }

    /* ── Admin UI ── */
    .admin-panel {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px;
    }
  </style>
</head>
<body>

<!-- Admin UI (hidden on print) -->
<div class="no-print admin-panel">
  <div class="flex items-center gap-3 mb-6">
    <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:#3B2FF5">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="1" y="1" width="7" height="7" rx="1.5" fill="white"/>
        <rect x="10" y="1" width="7" height="7" rx="1.5" fill="white" opacity="0.6"/>
        <rect x="1" y="10" width="7" height="7" rx="1.5" fill="white" opacity="0.6"/>
        <rect x="11" y="11" width="5" height="5" rx="1" fill="white"/>
      </svg>
    </div>
    <div>
      <h1 class="text-lg font-bold text-gray-900">LinkNPark — Sticker Generator</h1>
      <p class="text-xs text-gray-500">Generate print-ready sticker sheets</p>
    </div>
  </div>

  <!-- Series Generator -->
  <div class="bg-white rounded-2xl border border-gray-200 p-5 mb-4">
    <div class="flex items-center gap-2 mb-4">
      <div class="w-1 h-4 rounded-full" style="background:#3B2FF5"></div>
      <h2 class="text-sm font-bold text-gray-800">Series Generator</h2>
      <span class="text-xs text-gray-400 ml-2">Sequential codes — no duplicates, no guessing</span>
    </div>
    <div class="grid grid-cols-4 gap-3 mb-3">
      <div>
        <label class="text-xs font-semibold text-gray-600 block mb-1.5">Prefix</label>
        <input id="series-prefix" type="text" value="STK-2025-" oninput="updateSeriesPreview()"
          class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm font-mono focus:outline-none focus:border-indigo-500" />
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-600 block mb-1.5">Start Code</label>
        <input id="series-start" type="text" value="AA0001" oninput="updateSeriesPreview()"
          class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm font-mono focus:outline-none focus:border-indigo-500" />
        <p class="text-xs text-gray-400 mt-1">2 letters + 4 digits</p>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-600 block mb-1.5">Count</label>
        <input id="series-count" type="number" value="10" min="1" max="500" oninput="updateSeriesPreview()"
          class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500" />
        <p class="text-xs text-gray-400 mt-1">Max 500 per batch</p>
      </div>
      <div class="flex items-end">
        <button onclick="fillSeriesCodes()"
          class="w-full py-2.5 rounded-xl text-sm font-semibold text-white"
          style="background:linear-gradient(135deg,#3B2FF5,#6B5FFF)">
          Generate Series →
        </button>
      </div>
    </div>
    <div id="series-preview" class="text-xs font-mono text-gray-400 h-4"></div>
  </div>

  <!-- Sheet Settings -->
  <div class="bg-white rounded-2xl border border-gray-200 p-5 mb-5">
    <div class="flex items-center gap-2 mb-4">
      <div class="w-1 h-4 rounded-full bg-gray-300"></div>
      <h2 class="text-sm font-bold text-gray-800">Sheet Settings</h2>
    </div>
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="text-xs font-semibold text-gray-600 block mb-1.5">Scanner Base URL</label>
        <input id="base-url" type="text" value="https://linknpark.in/s"
          class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm font-mono focus:outline-none focus:border-indigo-500" />
        <p class="text-xs text-gray-400 mt-1">For local testing: http://192.168.1.3:8082</p>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-600 block mb-1.5">Sticker Codes (one per line)</label>
        <textarea id="codes-input" rows="4"
          class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm font-mono resize-none focus:outline-none focus:border-indigo-500"
          placeholder="STK-2025-AA0001&#10;STK-2025-AA0002&#10;…"></textarea>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-3 mb-4">
      <div>
        <label class="text-xs font-semibold text-gray-600 block mb-1.5">Sticker Size</label>
        <select id="size-select" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none">
          <option value="cr80">CR80 Card (85×54mm)</option>
          <option value="square">Square (60×60mm)</option>
        </select>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-600 block mb-1.5">Copies per code</label>
        <input id="copies" type="number" value="1" min="1" max="10"
          class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none" />
      </div>
      <div class="flex items-end">
        <button onclick="generateSheet()"
          class="w-full py-2.5 rounded-xl text-sm font-semibold border border-gray-200 text-gray-700 bg-white">
          Refresh Sheet →
        </button>
      </div>
    </div>

    <div id="gen-status" class="text-xs text-gray-400 hidden"></div>
  </div>

  <!-- Quick actions -->
  <div class="flex gap-3 mb-6">
    <button onclick="window.print()"
      class="flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold border border-gray-200 bg-white text-gray-700">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="4" width="12" height="7" rx="1.5" stroke="#374151" stroke-width="1.3"/><path d="M3 4V2.5A1.5 1.5 0 014.5 1h5A1.5 1.5 0 0111 2.5V4M4 11h6" stroke="#374151" stroke-width="1.3" stroke-linecap="round"/></svg>
      Print / Save PDF
    </button>
    <button onclick="exportCSV()"
      class="flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold border border-gray-200 bg-white text-gray-700">
      Export CSV
    </button>
    <div class="ml-auto flex items-center gap-2 text-xs text-gray-400">
      <div id="sticker-count" class="font-semibold text-gray-700">0</div> stickers on sheet
    </div>
  </div>
</div>

<!-- Print sheet -->
<div class="print-page" id="print-page">
  <div id="sticker-grid" class="sticker-grid">
    <!-- Stickers injected here -->
  </div>
</div>

<script>
  const SCANNER_BASE = () => document.getElementById('base-url').value.trim();

  function stickerUrl(code) {
    const base = SCANNER_BASE();
    // Use query param for static hosting, path for dynamic
    return base.includes('linknpark.in')
      ? `${base}?code=${code}`
      : `${base}?code=${code}`;
  }

  async function renderQR(container, url) {
    const canvas = document.createElement('canvas');
    await QRCode.toCanvas(canvas, url, {
      width: 113, // 30mm at 96dpi
      margin: 1,
      color: { dark: '#111111', light: '#ffffff' },
    });
    container.appendChild(canvas);
  }

  function parseSeriesCode(raw) {
    const match = raw.trim().toUpperCase().match(/^([A-Z]{2})(\d{4})$/);
    if (!match) return null;
    return { letters: match[1], num: parseInt(match[2]) };
  }

  function nextLetters(letters) {
    const a = letters.split('');
    let i = a.length - 1;
    while (i >= 0) {
      if (a[i] < 'Z') { a[i] = String.fromCharCode(a[i].charCodeAt(0) + 1); return a.join(''); }
      a[i] = 'A';
      i--;
    }
    return 'AA'; // wrap at ZZ → AA
  }

  function buildSeriesCodes(prefix, startCode, count) {
    const parsed = parseSeriesCode(startCode);
    if (!parsed) return null;
    let { letters, num } = parsed;
    const codes = [];
    for (let i = 0; i < count; i++) {
      codes.push(prefix + letters + String(num).padStart(4, '0'));
      num++;
      if (num > 9999) { num = 1; letters = nextLetters(letters); }
    }
    return codes;
  }

  function updateSeriesPreview() {
    const prefix = document.getElementById('series-prefix').value.trim();
    const startCode = document.getElementById('series-start').value.trim();
    const count = Math.min(parseInt(document.getElementById('series-count').value) || 0, 500);
    const el = document.getElementById('series-preview');
    if (!count) { el.textContent = ''; return; }
    const codes = buildSeriesCodes(prefix, startCode, count);
    if (!codes) {
      el.textContent = '⚠ Start code must be 2 letters + 4 digits e.g. AB0001';
      el.style.color = '#EF4444';
    } else {
      el.textContent = `${codes[0]}  →  ${codes[codes.length - 1]}  (${codes.length} codes)`;
      el.style.color = '#6B7280';
    }
  }

  function fillSeriesCodes() {
    const prefix = document.getElementById('series-prefix').value.trim();
    const startCode = document.getElementById('series-start').value.trim();
    const count = Math.min(parseInt(document.getElementById('series-count').value) || 10, 500);
    const codes = buildSeriesCodes(prefix, startCode, count);
    if (!codes) {
      document.getElementById('series-preview').textContent = '⚠ Start code must be 2 letters + 4 digits e.g. AB0001';
      document.getElementById('series-preview').style.color = '#EF4444';
      return;
    }
    document.getElementById('codes-input').value = codes.join('\n');
    // Advance start code for next batch
    const last = codes[codes.length - 1].replace(prefix, '');
    const parsed = parseSeriesCode(last);
    if (parsed) {
      let { letters, num } = parsed;
      num++;
      if (num > 9999) { num = 1; letters = nextLetters(letters); }
      document.getElementById('series-start').value = letters + String(num).padStart(4, '0');
    }
    updateSeriesPreview();
    generateSheet();
  }

  function exportCSV() {
    const raw = document.getElementById('codes-input').value.trim();
    if (!raw) return;
    const base = document.getElementById('base-url').value.trim();
    const codes = raw.split('\n').map(s => s.trim().toUpperCase()).filter(Boolean);
    const rows = ['Code,URL'];
    codes.forEach(c => rows.push(`${c},${base}?code=${c}`));
    const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `linknpark-stickers-${Date.now()}.csv`;
    a.click();
  }

  async function generateSheet() {
    const raw = document.getElementById('codes-input').value.trim();
    const copies = parseInt(document.getElementById('copies').value) || 1;
    const codes = raw.split('\n').map(s => s.trim().toUpperCase()).filter(Boolean);
    const allCodes = codes.flatMap(c => Array(copies).fill(c));

    const grid = document.getElementById('sticker-grid');
    grid.innerHTML = '';
    document.getElementById('sticker-count').textContent = allCodes.length;

    const status = document.getElementById('gen-status');
    status.textContent = `Generating ${allCodes.length} sticker(s)…`;
    status.classList.remove('hidden');

    for (const code of allCodes) {
      const url = stickerUrl(code);
      const sticker = document.createElement('div');
      sticker.className = 'sticker';
      sticker.innerHTML = `
        <div class="sticker-left">
          <div>
            <div class="sticker-brand">LinkNPark</div>
            <div class="sticker-brand-sub">linknpark.in</div>
          </div>
          <div class="sticker-instruction">Scan to<br><u>contact the</u><br><u>vehicle owner</u></div>
          <div class="sticker-bottom">
            <div class="sticker-code">${code}</div>
            <div class="sticker-icons-row">
              <div class="sticker-icon" title="Wrong Parking">🚫</div>
              <div class="sticker-icon" title="Accident">⚠️</div>
              <div class="sticker-icon" title="Emergency">🆘</div>
            </div>
          </div>
        </div>
        <div class="sticker-right">
          <div class="sticker-qr" id="qr-${code}"></div>
          <div class="sticker-scan-hint">Scan using<br>phone camera</div>
        </div>
      `;
      grid.appendChild(sticker);
      await renderQR(document.getElementById(`qr-${code}`), url);
    }

    status.textContent = `✓ ${allCodes.length} sticker(s) ready. Click "Print / Save PDF" to export.`;
  }

  // Init preview on load
  updateSeriesPreview();
</script>
</body>
</html>
