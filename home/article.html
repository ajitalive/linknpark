<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LinkNPark — Article</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --primary: #2CFF05;
      --primary-dim: rgba(44,255,5,0.12);
      --primary-glow: rgba(44,255,5,0.35);
      --bg: #000000;
      --surface: #0A0A0A;
      --card: #111111;
      --border: rgba(255,255,255,0.07);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    html, body {
      background: var(--bg);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow-x: hidden;
      width: 100%;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 36px 36px;
    }
    .markdown-body {
      color: #e5e7eb;
      font-size: 1.125rem;
      line-height: 1.75;
    }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 {
      color: #fff;
      font-weight: 800;
      margin-top: 2.5rem;
      margin-bottom: 1rem;
      line-height: 1.2;
    }
    .markdown-body h1 { font-size: 2.5rem; }
    .markdown-body h2 { font-size: 1.875rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    .markdown-body p { margin-bottom: 1.5rem; }
    .markdown-body a { color: var(--primary); text-decoration: none; }
    .markdown-body a:hover { text-decoration: underline; }
    .markdown-body ul, .markdown-body ol { margin-bottom: 1.5rem; padding-left: 1.5rem; }
    .markdown-body ul { list-style-type: disc; }
    .markdown-body blockquote {
      border-left: 4px solid var(--primary);
      background: var(--primary-dim);
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      border-radius: 0 0.5rem 0.5rem 0;
    }
    .markdown-body img {
      max-width: 100%;
      border-radius: 1rem;
      margin: 2rem 0;
      border: 1px solid var(--border);
    }
    .markdown-body hr {
      border-color: var(--border);
      margin: 3rem 0;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col relative">
  <!-- Nav -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-[#000000]/80 backdrop-blur-xl border-b border-white/5">
    <div class="max-w-6xl mx-auto px-4 sm:px-5 h-16 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 sm:gap-2.5">
        <img src="./logo.png" class="w-8 h-8 rounded-lg" alt="LinkNPark Logo" />
        <span class="font-black text-white tracking-tight text-base">LinkNPark</span>
      </a>
      <div class="flex items-center gap-6 font-medium">
        <a href="/" class="text-sm text-gray-400 hover:text-white transition-colors">Home</a>
        <a href="/blog.html" class="text-sm text-[var(--primary)] font-bold transition-colors">Blog</a>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="flex-1 relative z-10 pt-32 pb-20 px-4 sm:px-6">
    <div class="max-w-3xl mx-auto">
      <div id="content" class="markdown-body">
        <div class="animate-pulse flex space-x-4">
          <div class="flex-1 space-y-6 py-1">
            <div class="h-8 bg-gray-800 rounded w-3/4"></div>
            <div class="space-y-3">
              <div class="h-4 bg-gray-800 rounded"></div>
              <div class="h-4 bg-gray-800 rounded"></div>
              <div class="h-4 bg-gray-800 rounded w-5/6"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    async function loadArticle() {
      const urlParams = new URLSearchParams(window.location.search);
      const articleId = urlParams.get('id');
      const contentDiv = document.getElementById('content');

      if (!articleId) {
        contentDiv.innerHTML = '<h1>Article not found</h1><p>Please return to the <a href="/blog.html">blog</a>.</p>';
        return;
      }

      try {
        const response = await fetch(`/articles/${articleId}.md`);
        if (!response.ok) throw new Error('Failed to load');
        let markdown = await response.text();
        
        // Remove markdown alerts like > [!NOTE]
        markdown = markdown.replace(/> \[\!(NOTE|WARNING|IMPORTANT)\]\n(> .*\n?)+/g, (match) => {
          return match.replace(/> \[\!(NOTE|WARNING|IMPORTANT)\]\n/, '').replace(/> /g, '');
        });

        contentDiv.innerHTML = marked.parse(markdown);
      } catch (e) {
        contentDiv.innerHTML = '<h1>Article not found</h1><p>We could not find the requested article. Please return to the <a href="/blog.html">blog</a>.</p>';
      }
    }

    loadArticle();
  </script>
</body>
</html>
