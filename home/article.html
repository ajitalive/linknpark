<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redirecting… — LinkNPark</title>
  <!-- Legacy client-side article renderer, superseded by the static pages
       built by build-blog.js. Kept only to forward old article.html?id=<slug>
       links to /articles/<slug>. -->
  <meta name="robots" content="noindex, follow"/>
  <link rel="canonical" href="https://linknpark.in/blog.html"/>
  <script>
    (function () {
      var id = new URLSearchParams(window.location.search).get('id');
      // slugs are kebab-case; reject anything else so this can't be abused as an open redirect
      if (id && /^[a-z0-9-]+$/.test(id)) {
        window.location.replace('/articles/' + id);
      } else {
        window.location.replace('/blog.html');
      }
    })();
  </script>
  <noscript><meta http-equiv="refresh" content="0; url=/blog.html"/></noscript>
</head>
<body style="background:#000;color:#e5e7eb;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0">
  <p>Redirecting to the <a href="/blog.html" style="color:#2CFF05">LinkNPark blog</a>…</p>
</body>
</html>
